name: HF Space Keepalive

on:
  schedule:
    # Keep the Hugging Face Space warm well before its 48h idle GC window.
    # UTC times: 01:17 / 13:17 = Beijing 09:17 / 21:17.
    - cron: "17 1,13 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping HF Space health endpoint
        run: |
          set -euo pipefail
          URL="https://liuhaocun-open-design-api-wrapper.hf.space/health"
          echo "Pinging ${URL}"
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 10 --retry-all-errors \
            --connect-timeout 20 --max-time 90 \
            "${URL}"
          echo
          echo "HF Space keepalive OK"
