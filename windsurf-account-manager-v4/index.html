<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Windsurf Account Manager</title>
<style>
:root{--bg:#090d18;--panel:#101827;--panel2:#151f33;--line:#25314a;--text:#eef4ff;--muted:#91a0b8;--blue:#4f8cff;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--cyan:#22d3ee}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#08111f,#0a0d16 45%,#111827);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:rgba(10,15,26,.9);border-right:1px solid var(--line);padding:20px;position:sticky;top:0;height:100vh}.logo{font-size:22px;font-weight:900;letter-spacing:-.04em;margin-bottom:6px}.sub{color:var(--muted);font-size:12px;line-height:1.5;margin-bottom:22px}.nav button{width:100%;text-align:left;margin:6px 0;background:transparent;border:1px solid transparent;color:var(--muted);padding:11px 12px;border-radius:12px}.nav button.active,.nav button:hover{background:#142039;color:var(--text);border-color:var(--line)}.main{padding:22px 26px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.top h1{margin:0;font-size:28px}.btns{display:flex;gap:9px;flex-wrap:wrap}button,input,select,textarea{font:inherit}button{border:0;border-radius:11px;padding:9px 12px;color:var(--text);background:#24324d;cursor:pointer}button:hover{filter:brightness(1.14)}.primary{background:linear-gradient(135deg,#2563eb,#06b6d4)}.danger{background:#7f1d1d}.ghost{background:transparent;border:1px solid var(--line)}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat{background:rgba(16,24,39,.9);border:1px solid var(--line);border-radius:16px;padding:14px}.stat b{font-size:25px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.panel{background:rgba(16,24,39,.88);border:1px solid var(--line);border-radius:18px;overflow:hidden}.toolbar{display:flex;gap:10px;padding:14px;border-bottom:1px solid var(--line);align-items:center;flex-wrap:wrap}.toolbar input,.toolbar select{background:#0a1020;color:var(--text);border:1px solid var(--line);border-radius:11px;padding:10px;outline:none}.toolbar input{flex:1;min-width:260px}table{width:100%;border-collapse:collapse}th,td{padding:13px 12px;border-bottom:1px solid rgba(37,49,74,.72);text-align:left;vertical-align:middle}th{color:#b8c4d9;font-size:12px;background:#121c2f}td{font-size:14px}.email{color:#cbd5e1;font-size:12px;margin-top:3px}.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;background:#0a1020}.ok{color:var(--green);border-color:rgba(34,197,94,.35)}.warn{color:var(--yellow);border-color:rgba(245,158,11,.35)}.bad{color:var(--red);border-color:rgba(239,68,68,.35)}.unknown{color:var(--muted)}.bar{width:120px;height:9px;background:#0a1020;border:1px solid var(--line);border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--green)}.fill.warn{background:var(--yellow)}.fill.bad{background:var(--red)}.rowbtns{display:flex;gap:6px;flex-wrap:wrap}.rowbtns button{font-size:12px;padding:7px 8px}.current{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,rgba(37,99,235,.25),rgba(34,211,238,.12));border:1px solid rgba(79,140,255,.4);border-radius:16px;padding:14px;margin-bottom:16px}.current strong{font-size:16px}.muted{color:var(--muted)}dialog{width:min(780px,calc(100vw - 28px));border:1px solid var(--line);border-radius:18px;background:#0f172a;color:var(--text);padding:0}dialog::backdrop{background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}.dh{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.form{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:#cbd5e1}.field input,.field select,.field textarea{background:#080d18;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px}.field textarea{min-height:82px}.da{padding:14px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}.toast{position:fixed;right:18px;bottom:18px;background:#101827;border:1px solid var(--line);border-radius:12px;padding:12px;display:none}.toast.show{display:block}.hide{display:none}@media(max-width:960px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.cards{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}table{display:block;overflow:auto}.top{flex-direction:column;align-items:flex-start}}
</style>
</head><body><div class="app"><aside class="side"><div class="logo">Windsurf Manager</div><div class="sub">按 Windsurf-Tool 的账号管理器形态做：账号池、状态、额度、Profile 启动。不会自动注册/补 token/绕限制。</div><div class="nav"><button class="active">账号池</button><button onclick="showHelp()">使用说明</button><button onclick="exportData()">导出备份</button><button onclick="importFile.click()">导入备份</button><input id="importFile" type="file" accept="application/json" hidden></div></aside><main class="main"><div class="top"><h1>账号池</h1><div class="btns"><button class="ghost" onclick="bulkImport()">批量导入邮箱</button><button class="ghost" onclick="refreshAllMock()">刷新队列 UI</button><button class="primary" onclick="openEdit()">+ 添加账号</button></div></div><section class="current"><div><div class="muted">当前工作账号</div><strong id="currentText">未选择</strong></div><button class="primary" onclick="openCurrent()">打开当前账号 Profile</button></section><section class="cards"><div class="stat"><b id="nTotal">0</b><span>账号总数</span></div><div class="stat"><b id="nReady">0</b><span>可用/正常</span></div><div class="stat"><b id="nLow">0</b><span>额度低</span></div><div class="stat"><b id="nSoon">0</b><span>快到期</span></div></section><section class="panel"><div class="toolbar"><input id="q" placeholder="搜索邮箱、昵称、备注" oninput="render()"><select id="statusFilter" onchange="render()"><option value="all">全部状态</option><option value="ready">正常</option><option value="check">待检查</option><option value="expired">过期</option></select><select id="sort" onchange="render()"><option value="updated">最近更新</option><option value="quota">额度低优先</option><option value="expires">到期时间</option></select></div><table><thead><tr><th>账号</th><th>状态</th><th>日额度</th><th>周额度</th><th>到期/重置</th><th>操作</th></tr></thead><tbody id="tbody"></tbody></table></section></main></div><dialog id="dlg"><div class="dh"><b id="dlgTitle">添加账号</b><button class="ghost" onclick="dlg.close()">关闭</button></div><form id="form"><div class="form"><input id="id" type="hidden"><div class="field"><label>昵称</label><input id="name" placeholder="主力号 / 备用号"></div><div class="field"><label>邮箱</label><input id="email" required placeholder="xxx@gmail.com"></div><div class="field"><label>状态</label><select id="status"><option value="ready">正常</option><option value="check">待检查</option><option value="expired">过期</option></select></div><div class="field"><label>套餐</label><select id="plan"><option>Unknown</option><option>Free</option><option>Trial</option><option>Pro</option><option>Team</option></select></div><div class="field"><label>日额度已用 %</label><input id="daily" type="number" min="0" max="100"></div><div class="field"><label>周额度已用 %</label><input id="weekly" type="number" min="0" max="100"></div><div class="field"><label>到期日期</label><input id="expires" type="date"></div><div class="field"><label>重置提示</label><input id="reset" placeholder="10h / 3d / 明天 8:00"></div><div class="field full"><label>Profile/用量页</label><input id="profileUrl" value="https://windsurf.com/profile"></div><div class="field full"><label>订阅页</label><input id="billingUrl" value="https://windsurf.com/subscription/manage-plan"></div><div class="field full"><label>粘贴官方页面文本自动解析</label><textarea id="raw" placeholder="从官方 Profile/Usage/Billing 页面复制文本粘这里，然后点解析"></textarea><button type="button" class="ghost" onclick="parseRaw()">解析文本并填入</button></div><div class="field full"><label>备注</label><textarea id="notes"></textarea></div></div><div class="da"><button type="button" class="ghost" onclick="dlg.close()">取消</button><button class="primary">保存</button></div></form></dialog><div id="toast" class="toast"></div><script>
const KEY='windsurf-manager-v4';let data=[],currentId=localStorage.getItem(KEY+'-current')||'';const $=id=>document.getElementById(id);function id(){return 'a_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function load(){try{data=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{data=[]}if(!data.length){data=[{id:id(),name:'示例主力号',email:'your@gmail.com',status:'check',plan:'Trial',daily:40,weekly:25,expires:'',reset:'手动检查',profileUrl:'https://windsurf.com/profile',billingUrl:'https://windsurf.com/subscription/manage-plan',notes:'删掉我，换成你的账号。',updatedAt:new Date().toISOString()}];save()}}function save(){localStorage.setItem(KEY,JSON.stringify(data))}function pct(x){x=Number(x);return isFinite(x)?Math.max(0,Math.min(100,x)):0}function left(x){return 100-pct(x)}function days(d){if(!d)return null;let t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(d+'T00:00:00')-t)/864e5)}function clsQuota(v){let l=left(v);return l<10?'bad':l<30?'warn':'ok'}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function chip(a){let d=days(a.expires);if(a.status==='expired'||(d!==null&&d<0))return '<span class="chip bad">过期</span>';if(d!==null&&d<=7)return '<span class="chip warn">快到期</span>';if(a.status==='ready')return '<span class="chip ok">正常</span>';return '<span class="chip warn">待检查</span>'}function bar(v){v=pct(v);return `<div class="bar"><div class="fill ${clsQuota(v)}" style="width:${v}%"></div></div><div class="muted">已用 ${v}% / 剩 ${100-v}%</div>`}function render(){let q=$('q').value.toLowerCase(),sf=$('statusFilter').value,so=$('sort').value;let arr=data.filter(a=>(a.email+a.name+a.notes).toLowerCase().includes(q));if(sf!=='all')arr=arr.filter(a=>a.status===sf);arr.sort((a,b)=>so==='quota'?(left(a.daily)+left(a.weekly))-(left(b.daily)+left(b.weekly)):so==='expires'?(a.expires||'9999').localeCompare(b.expires||'9999'):(b.updatedAt||'').localeCompare(a.updatedAt||''));$('nTotal').textContent=data.length;$('nReady').textContent=data.filter(a=>a.status==='ready').length;$('nLow').textContent=data.filter(a=>left(a.daily)<30||left(a.weekly)<30).length;$('nSoon').textContent=data.filter(a=>{let d=days(a.expires);return d!==null&&d>=0&&d<=7}).length;let cur=data.find(a=>a.id===currentId);$('currentText').textContent=cur?`${cur.name||cur.email} · ${cur.email}`:'未选择';$('tbody').innerHTML=arr.map(a=>`<tr><td><b>${esc(a.name||'未命名')}</b><div class="email">${esc(a.email)}</div><div class="muted">${esc(a.plan||'Unknown')}</div></td><td>${chip(a)} ${a.id===currentId?'<span class="chip ok">当前</span>':''}</td><td>${bar(a.daily)}</td><td>${bar(a.weekly)}</td><td>${a.expires?esc(a.expires):'未填'}<div class="muted">${esc(a.reset||'')}</div></td><td><div class="rowbtns"><button class="primary" onclick="setCurrent('${a.id}');openProfile('${a.id}','profile')">登录/额度</button><button onclick="openProfile('${a.id}','billing')">订阅</button><button onclick="setCurrent('${a.id}')">设为当前</button><button onclick="edit('${a.id}')">编辑</button><button class="danger" onclick="delAcc('${a.id}')">删</button></div></td></tr>`).join('')||'<tr><td colspan="6" class="muted">没有账号</td></tr>'}function openEdit(){form.reset();$('id').value='';$('profileUrl').value='https://windsurf.com/profile';$('billingUrl').value='https://windsurf.com/subscription/manage-plan';$('dlgTitle').textContent='添加账号';dlg.showModal()}function edit(x){let a=data.find(v=>v.id===x);if(!a)return;$('dlgTitle').textContent='编辑账号';['id','name','email','status','plan','daily','weekly','expires','reset','profileUrl','billingUrl','notes'].forEach(k=>$(k).value=a[k]??'');$('raw').value='';dlg.showModal()}form.onsubmit=e=>{e.preventDefault();let x=$('id').value||id(),old=data.find(a=>a.id===x),a={...(old||{}),id:x,name:$('name').value.trim(),email:$('email').value.trim(),status:$('status').value,plan:$('plan').value,daily:pct($('daily').value),weekly:pct($('weekly').value),expires:$('expires').value,reset:$('reset').value.trim(),profileUrl:$('profileUrl').value.trim(),billingUrl:$('billingUrl').value.trim(),notes:$('notes').value.trim(),updatedAt:new Date().toISOString()};data=old?data.map(v=>v.id===x?a:v):[a,...data];save();dlg.close();render();toast('已保存')};function delAcc(x){if(confirm('删除这个账号？')){data=data.filter(a=>a.id!==x);if(currentId===x){currentId='';localStorage.removeItem(KEY+'-current')}save();render()}}function setCurrent(x){currentId=x;localStorage.setItem(KEY+'-current',x);render()}async function openProfile(x,kind){let a=data.find(v=>v.id===x);if(!a)return;let url=kind==='billing'?(a.billingUrl||'https://windsurf.com/subscription/manage-plan'):(a.profileUrl||'https://windsurf.com/profile');try{let r=await fetch('/api/open-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:a.email,nickname:a.name,url})});if(r.ok){toast('已用该账号独立浏览器 Profile 打开');return}}catch(e){}window.open(url,'_blank');toast('网页模式：普通打开。要独立 Profile 请用 launch-desktop.bat')}function openCurrent(){if(!currentId)return toast('先设一个当前账号');openProfile(currentId,'profile')}function parseRaw(){let t=$('raw').value.replace(/\s+/g,' ');if(!t)return toast('先粘贴文本');let ps=[...t.matchAll(/(\d{1,3})\s*%/g)].map(m=>pct(m[1]));if(ps[0]!=null)$('daily').value=ps[0];if(ps[1]!=null)$('weekly').value=ps[1];if(/pro/i.test(t))$('plan').value='Pro';else if(/trial|试用/i.test(t))$('plan').value='Trial';else if(/free|免费/i.test(t))$('plan').value='Free';let d=t.match(/(20\d{2})[-/.年](\d{1,2})[-/.月](\d{1,2})/);if(d)$('expires').value=`${d[1]}-${String(d[2]).padStart(2,'0')}-${String(d[3]).padStart(2,'0')}`;let r=t.match(/(?:reset|重置|refresh)[^;；。]{0,40}/i);if(r)$('reset').value=r[0];toast('已解析，扫一眼再保存')}function bulkImport(){let s=prompt('一行一个邮箱，可写：邮箱,昵称');if(!s)return;let rows=s.split(/\n+/).map(x=>x.trim()).filter(Boolean);let now=new Date().toISOString();let add=rows.map(r=>{let [email,name]=r.split(',').map(x=>x?.trim());return{id:id(),email,name:name||'',status:'check',plan:'Unknown',daily:0,weekly:0,expires:'',reset:'',profileUrl:'https://windsurf.com/profile',billingUrl:'https://windsurf.com/subscription/manage-plan',notes:'',updatedAt:now}});data=[...add,...data];save();render();toast('已导入 '+add.length+' 个')}function refreshAllMock(){let i=0;toast('刷新队列启动：逐个打开官方页由你登录/查看');let arr=[...data];function next(){if(i>=arr.length)return toast('刷新队列结束');setCurrent(arr[i].id);openProfile(arr[i].id,'profile');i++;setTimeout(next,1200)}next()}function exportData(){let blob=new Blob([JSON.stringify({version:4,data},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='windsurf-manager-backup.json';a.click()}importFile.onchange=async e=>{let f=e.target.files[0];if(!f)return;let j=JSON.parse(await f.text());data=j.data||j.accounts||j;save();render();toast('导入完成')};function showHelp(){alert('用法：1 双击 launch-desktop.bat；2 添加账号；3 点“登录/额度”，第一次自己登录；4 后续同邮箱复用独立浏览器 Profile；5 在官方页复制文本，编辑账号里粘贴解析额度。')}function toast(s){let t=$('toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300)}load();render();
</script></body></html>
